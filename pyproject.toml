[tool.ruff]
line-length = 120
target-version = "py39"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B"]
# E501 (line length) is relaxed: argparse help/error strings are intentionally
# long single literals that read better unwrapped.
ignore = ["E501"]

[tool.mypy]
python_version = "3.9"
ignore_missing_imports = true
